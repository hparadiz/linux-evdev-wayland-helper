name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run coverage
        run: |
          set -o pipefail
          npm run test:coverage 2>&1 | tee coverage.txt

      - name: Generate coverage badge
        run: npm run coverage:badge

      - name: Build native helper
        run: npm run build:native

      - name: Check demo scripts
        run: node --check demo/main.mjs && node --check demo/preload.cjs && node --check demo/overlay.js

      - name: Commit coverage badge
        if: github.event_name == 'push'
        run: |
          if git diff --quiet -- .github/badges/coverage.svg; then
            echo "Coverage badge unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.svg
          git commit -m "Update coverage badge [skip ci]"
          git push
